services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      mock-erp:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: liaison
      POSTGRES_PASSWORD: liaison
      POSTGRES_DB: businessdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liaison -d businessdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-erp:
    build: .
    command: ["uvicorn", "liaison.connectors.mock_erp:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
